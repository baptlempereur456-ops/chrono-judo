<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Chrono Judo Synchronisé</title>
    <!-- Inclusion de Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg-color: #000000;
            --white-side: #ffffff;
            --blue-side: #0022aa;
            --ijf-yellow: #ffdf00;
            --ijf-red: #cc0000;
        }

        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background-color: #121212;
            color: white;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            height: 100vh;
            width: 100vw;
        }

        /* --- PANNEAU DE CONTROLE --- */
        #control-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            height: 100vh;
            padding: 10px;
            box-sizing: border-box;
            gap: 10px;
        }

        .fighter-control {
            border: 5px solid;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
            padding: 15px;
        }

        .white-ctrl { border-color: var(--white-side); background: #222; }
        .blue-ctrl { border-color: var(--blue-side); background: #001133; }

        .btn-group { display: flex; gap: 10px; }

        button, select {
            cursor: pointer;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            font-size: 1.2rem;
        }
        button:active { transform: scale(0.95); }

        .btn-score { padding: 25px 35px; font-size: 1.6rem; }
        .btn-ippon { background-color: var(--ijf-yellow); color: black; }
        .btn-waza { background-color: #ff9900; color: white; }
        .btn-shido { background-color: #cc0000; color: white; }
        .btn-reset { background-color: #555; color: white; padding: 10px; }

        #timer-controls {
            grid-column: span 2;
            background: #222;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 12px;
            border-radius: 10px;
            padding: 15px;
        }

        .select-age {
            padding: 12px 24px;
            background-color: #333;
            color: white;
            border: 2px solid #555;
        }

        #pc-chrono {
            font-size: 3.5rem;
            font-weight: bold;
            color: #ffff00;
            font-family: monospace;
            background: #000;
            padding: 5px 40px;
            border-radius: 8px;
            border: 2px solid #444;
        }

        .btn-timer { padding: 15px 35px; font-size: 1.4rem; background-color: #28a745; color: white;}
        .btn-pause { background-color: #dc3545; }
        .btn-view-mode { background-color: #6f42c1; color: white; font-size: 1.2rem; padding: 10px 20px; width: 80%; max-width: 300px; margin-top: 5px;}

        /* --- MODE TV (PLEIN ÉCRAN DISTANT) --- */
        #tv-panel {
            display: none; 
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: var(--bg-color);
            grid-template-rows: 42fr 42fr 16fr;
            box-sizing: border-box;
            z-index: 999;
        }

        body.tv-mode-active #tv-panel { display: grid; }
        body.tv-mode-active #control-panel { display: none; }

        .fighter-row {
            display: flex;
            align-items: center;
            position: relative;
            padding: 0 5vw;
        }
        
        .row-white { background-color: #ffffff; border-bottom: 2px solid #ddd; }
        .row-blue { background-color: #000d26; border-bottom: 2px solid #111; }

        .color-indicator { width: 4vw; height: 50%; border-radius: 8px; margin-right: 4vw; }
        .row-white .color-indicator { background-color: #e0e0e0; }
        .row-blue .color-indicator { background-color: var(--blue-side); }
        .fighter-info { flex-grow: 1; }

        .score-display { font-size: 16vw; font-weight: 900; font-family: 'Arial Black', sans-serif; min-width: 15vw; text-align: center; }
        .score-display.is-ippon-text { font-size: 10vw; }
        .row-white .score-display { color: #000000; }
        .row-blue .score-display { color: #ffffff; }

        .shido-container { display: flex; gap: 1.5vw; margin-right: 5vw; width: 12vw; justify-content: flex-end; align-items: center; }
        .shido-card { width: 2.5vw; height: 4.5vw; background-color: var(--ijf-yellow); border-radius: 4px; display: none; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .shido-card.active { display: block; }
        
        .red-card { width: 3.5vw; height: 6vw; background-color: var(--ijf-red); border-radius: 6px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); animation: blink 0.8s infinite alternate; }
        @keyframes blink { from { opacity: 1; } to { opacity: 0.6; } }

        .timer-row { display: flex; align-items: center; justify-content: space-between; background-color: #050505; padding: 0 5vw; height: 100%; box-sizing: border-box; }
        .category-tag { font-size: 2.5vw; font-weight: bold; color: #28a745; text-transform: uppercase; }
        .time-display { font-size: 7.5vw; font-weight: 900; color: #ffff00; font-family: 'Arial Black', sans-serif; line-height: 1; }
        .time-display.gs-active { color: #ff9900; }

        /* Osaekomi */
        .osaekomi-container { position: absolute; bottom: 5vh; left: 5vw; width: 40vw; display: none; flex-direction: column; gap: 5px; z-index: 10; }
        .osaekomi-container.active { display: flex; }
        .osaekomi-label { font-weight: 900; font-size: 2.2vw; text-transform: uppercase; }
        .row-white .osaekomi-label { color: #000000; }
        .row-blue .osaekomi-label { color: #ffffff; }
        .progress-bg { width: 100%; height: 3vh; background: rgba(0, 0, 0, 0.3); border: 2px solid rgba(255, 255, 255, 0.4); border-radius: 5px; overflow: hidden; }
        .row-white .progress-bg { border-color: rgba(0,0,0,0.4); }
        .progress-bar { width: 0%; height: 100%; background: #ff9900; transition: width 0.2s linear, background-color 0.3s; }
        .progress-bar.ippon-reach { background: #28a745; }
    </style>
</head>
<body>

    <!-- ================= PANNEAU DE CONTROLE ================= -->
    <div id="control-panel">
        <div class="fighter-control white-ctrl">
            <h2 style="color: white; font-size: 2rem; margin: 0;">BLANC</h2>
            <div class="btn-group">
                <button class="btn-score btn-ippon" onclick="addScore('white', 'ippon')">IPPON</button>
                <button class="btn-score btn-waza" onclick="addScore('white', 'waza')">WAZA-ARI</button>
            </div>
            <div class="btn-group">
                <button class="btn-score btn-shido" onclick="addPenalty('white', 1)">SHIDO</button>
                <button class="btn-score btn-shido" style="background-color: darkred;" onclick="addPenalty('white', 3)">H-MAKE</button>
            </div>
            <button class="btn-timer" style="background-color: #555; padding: 15px 40px;" onclick="startOsaekomi('white')">Osaekomi Blanc</button>
            <button class="btn-reset" onclick="resetFighter('white')">Reset Blanc</button>
        </div>

        <div class="fighter-control blue-ctrl">
            <h2 style="color: white; font-size: 2rem; margin: 0;">BLEU</h2>
            <div class="btn-group">
                <button class="btn-score btn-ippon" onclick="addScore('blue', 'ippon')">IPPON</button>
                <button class="btn-score btn-waza" onclick="addScore('blue', 'waza')">WAZA-ARI</button>
            </div>
            <div class="btn-group">
                <button class="btn-score btn-shido" onclick="addPenalty('blue', 1)">SHIDO</button>
                <button class="btn-score btn-shido" style="background-color: darkred;" onclick="addPenalty('blue', 3)">H-MAKE</button>
            </div>
            <button class="btn-timer" style="background-color: #555; padding: 15px 40px;" onclick="startOsaekomi('blue')">Osaekomi Bleu</button>
            <button class="btn-reset" onclick="resetFighter('blue')">Reset Bleu</button>
        </div>

        <div id="timer-controls">
            <div style="display: flex; gap: 10px; align-items: center;">
                <label style="font-weight: bold;">Catégorie :</label>
                <select id="age-select" class="select-age" onchange="changeCategoryTime()">
                    <option value="120" data-label="POUSSINS">Poussins - 2 min</option>
                    <option value="120" data-label="BENJAMINS">Benjamins - 2 min</option>
                    <option value="180" data-label="MINIMES">Minimes - 3 min</option>
                    <option value="240" data-label="CADETS">Cadets - 4 min</option>
                    <option value="240" data-label="JUNIORS">Juniors - 4 min</option>
                    <option value="240" data-label="SENIORS" selected>Seniors - 4 min</option>
                </select>
            </div>

            <div id="pc-chrono">4:00</div>
            
            <div class="btn-group" style="flex-wrap: wrap; justify-content: center;">
                <button class="btn-timer" onclick="toggleTimer()">MARCHE / PAUSE</button>
                <button class="btn-timer btn-pause" onclick="stopOsaekomi()">TOKETA</button>
                <button class="btn-timer" style="background-color: #ff9900;" onclick="toggleGoldenScore()">GOLDEN SCORE</button>
                <button class="btn-reset" onclick="resetAll()">RESET TOUT</button>
            </div>
            <button class="btn-view-mode" onclick="switchToTVModeOnly()">Passer cet écran en Mode TV 📺</button>
        </div>
    </div>

    <!-- ================= PANNEAU D'AFFICHAGE TV ================= -->
    <div id="tv-panel">
        <div class="fighter-row row-white">
            <div class="color-indicator"></div>
            <div class="fighter-info"></div>
            <div class="osaekomi-container" id="white-osaekomi-container">
                <div class="osaekomi-label" id="white-osaekomi-text">OSAEKOMI : 0s</div>
                <div class="progress-bg"><div class="progress-bar" id="white-progress-bar"></div></div>
            </div>
            <div class="shido-container" id="white-shido-box"><div class="shido-card"></div><div class="shido-card"></div></div>
            <div id="tv-white-score" class="score-display">0</div>
        </div>

        <div class="fighter-row row-blue">
            <div class="color-indicator"></div>
            <div class="fighter-info"></div>
            <div class="osaekomi-container" id="blue-osaekomi-container">
                <div class="osaekomi-label" id="blue-osaekomi-text">OSAEKOMI : 0s</div>
                <div class="progress-bg"><div class="progress-bar" id="blue-progress-bar"></div></div>
            </div>
            <div class="shido-container" id="blue-shido-box"><div class="shido-card"></div><div class="shido-card"></div></div>
            <div id="tv-blue-score" class="score-display">0</div>
        </div>

        <div class="timer-row">
            <span class="category-tag" id="tv-meta">SENIORS</span>
            <span class="time-display" id="tv-chrono">4:00</span>
        </div>
    </div>

    <script>
        // ================= CONFIGURATION FIREBASE =================
        // REMPLACEZ L'URL CI-DESSOUS PAR VOTRE PROPRE URL OBTENUE SUR FIREBASE
        const firebaseConfig = {
            databaseURL: https://chrono-judo-eab79-default-rtdb.firebaseio.com/ 
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref("tatami1");

        // Structure locale de base
        let data = {
            white: { ippon: 0, waza: 0, shido: 0, hansoku: false },
            blue: { ippon: 0, waza: 0, shido: 0, hansoku: false },
            mainTime: 240, defaultTime: 240, categoryLabel: "SENIORS",
            timerRunning: false, isGoldenScore: false, osaekomiFighter: null, osaekomiTime: 0
        };

        let mainInterval, osaekomiInterval;
        let isTVModeDevice = false;

        // Écouter les changements de la base de données en temps réel
        db.on("value", (snapshot) => {
            const firebaseData = snapshot.val();
            if (firebaseData) {
                // Synchroniser les variables avec la base
                data = firebaseData;
                updateDOM();
                
                // Gérer le déclenchement local des chronos basé sur l'état Firebase
                manageLocalIntervals();
            }
        });

        // Envoyer les mises à jour à Firebase
        function syncToFirebase() {
            db.set(data);
        }

        function manageLocalIntervals() {
            // Chrono Principal
            if (data.timerRunning && !mainInterval) {
                mainInterval = setInterval(() => {
                    // Seul l'appareil de CONTROLE fait avancer le temps pour éviter les doubles sauts
                    if (!isTVModeDevice) {
                        if(data.isGoldenScore) data.mainTime++;
                        else { if(data.mainTime > 0) data.mainTime--; else data.timerRunning = false; }
                        syncToFirebase();
                    }
                }, 1000);
            } else if (!data.timerRunning && mainInterval) {
                clearInterval(mainInterval);
                mainInterval = null;
            }

            // Chrono Osaekomi
            if (data.osaekomiFighter && !osaekomiInterval && data.timerRunning) {
                osaekomiInterval = setInterval(() => {
                    if (!isTVModeDevice) {
                        data.osaekomiTime++;
                        if(data.osaekomiTime === 10) addScore(data.osaekomiFighter, 'waza');
                        if(data.osaekomiTime === 20) { addScore(data.osaekomiFighter, 'ippon'); data.osaekomiFighter = null; data.osaekomiTime = 0; }
                        syncToFirebase();
                    }
                }, 1000);
            } else if ((!data.osaekomiFighter || !data.timerRunning) && osaekomiInterval) {
                clearInterval(osaekomiInterval);
                osaekomiInterval = null;
            }
        }

        // --- Fonctions d'actions de match ---
        function changeCategoryTime() {
            if (isTVModeDevice) return;
            const select = document.getElementById('age-select');
            const selectedOption = select.options[select.selectedIndex];
            data.defaultTime = parseInt(selectedOption.value);
            data.categoryLabel = selectedOption.getAttribute('data-label');
            if (!data.timerRunning && !data.isGoldenScore) { data.mainTime = data.defaultTime; }
            syncToFirebase();
        }

        function addScore(fighter, type) {
            if (isTVModeDevice) return;
            if(type === 'ippon') { data[fighter].ippon = 1; data.timerRunning = false; }
            if(type === 'waza') data[fighter].waza += 1;
            if(data[fighter].waza >= 2) { data[fighter].ippon = 1; data.timerRunning = false; }
            syncToFirebase();
        }

        function addPenalty(fighter, amount) {
            if (isTVModeDevice) return;
            if (amount === 3) { data[fighter].hansoku = true; data.timerRunning = false; }
            else { data[fighter].shido += amount; if(data[fighter].shido >= 3) { data[fighter].hansoku = true; data.timerRunning = false; } }
            syncToFirebase();
        }

        function toggleTimer() {
            if (isTVModeDevice) return;
            if(!data.timerRunning && (data.white.ippon || data.blue.ippon || data.white.hansoku || data.blue.hansoku)) return;
            data.timerRunning = !data.timerRunning;
            syncToFirebase();
        }

        function toggleGoldenScore() {
            if (isTVModeDevice) return;
            data.isGoldenScore = !data.isGoldenScore;
            data.mainTime = data.isGoldenScore ? 0 : data.defaultTime;
            syncToFirebase();
        }

        function startOsaekomi(fighter) {
            if (isTVModeDevice) return;
            if(data.white.ippon || data.blue.ippon) return;
            data.osaekomiFighter = fighter;
            data.osaekomiTime = 0;
            data.timerRunning = true;
            syncToFirebase();
        }

        function stopOsaekomi() {
            if (isTVModeDevice) return;
            data.osaekomiFighter = null;
            data.osaekomiTime = 0;
            syncToFirebase();
        }

        function resetFighter(fighter) {
            if (isTVModeDevice) return;
            data[fighter].ippon = 0; data[fighter].waza = 0; data[fighter].shido = 0; data[fighter].hansoku = false;
            syncToFirebase();
        }

        function resetAll() {
            if (isTVModeDevice) return;
            data.mainTime = data.defaultTime; data.timerRunning = false; data.isGoldenScore = false; data.osaekomiFighter = null; data.osaekomiTime = 0;
            data.white = { ippon: 0, waza: 0, shido: 0, hansoku: false };
            data.blue = { ippon: 0, waza: 0, shido: 0, hansoku: false };
            syncToFirebase();
        }

        // --- Mise à jour visuelle (Identique sur les deux écrans) ---
        function updateDOM() {
            let mins = Math.floor(data.mainTime / 60).toString();
            let secs = (data.mainTime % 60).toString().padStart(2, '0');
            
            document.getElementById('pc-chrono').innerText = `${mins}:${secs}${data.isGoldenScore ? " GS" : ""}`;

            const wScore = document.getElementById('tv-white-score');
            const bScore = document.getElementById('tv-blue-score');

            if (data.white.ippon) { wScore.innerText = 'IPPON'; wScore.classList.add('is-ippon-text'); }
            else { wScore.innerText = data.white.waza; wScore.classList.remove('is-ippon-text'); }

            if (data.blue.ippon) { bScore.innerText = 'IPPON'; bScore.classList.add('is-ippon-text'); }
            else { bScore.innerText = data.blue.waza; bScore.classList.remove('is-ippon-text'); }

            renderShidos('white'); renderShidos('blue');
            document.getElementById('tv-chrono').innerText = `${mins}:${secs}`;
            const metaEl = document.getElementById('tv-meta');
            
            if (data.isGoldenScore) {
                document.getElementById('tv-chrono').classList.add('gs-active');
                metaEl.innerText = "GOLDEN SCORE"; metaEl.style.color = "#ff9900";
            } else {
                document.getElementById('tv-chrono').classList.remove('gs-active');
                metaEl.innerText = data.categoryLabel; metaEl.style.color = "#28a745";
            }
            manageOsaekomiDOM('white'); manageOsaekomiDOM('blue');
        }

        function manageOsaekomiDOM(fighter) {
            const container = document.getElementById(`${fighter}-osaekomi-container`);
            const label = document.getElementById(`${fighter}-osaekomi-text`);
            const bar = document.getElementById(`${fighter}-progress-bar`);
            if (data.osaekomiFighter === fighter) {
                container.classList.add('active');
                label.innerText = `OSAEKOMI : ${data.osaekomiTime}s`;
                let percentage = (data.osaekomiTime / 20) * 100;
                bar.style.width = `${Math.min(percentage, 100)}%`;
                if (data.osaekomiTime >= 10) bar.classList.add('ippon-reach');
                else bar.classList.remove('ippon-reach');
            } else { container.classList.remove('active'); bar.style.width = '0%'; bar.classList.remove('ippon-reach'); }
        }

        function renderShidos(fighter) {
            const container = document.getElementById(`${fighter}-shido-box`);
            if (data[fighter].hansoku) { container.innerHTML = '<div class="red-card"></div>'; }
            else {
                container.innerHTML = '<div class="shido-card"></div><div class="shido-card"></div>';
                const cards = container.querySelectorAll('.shido-card');
                for (let i = 0; i < data[fighter].shido; i++) { if(cards[i]) cards[i].classList.add('active'); }
            }
        }

        // Activer le mode TV uniquement pour l'ordinateur de la télé
        function switchToTVModeOnly() {
            isTVModeDevice = true;
            document.body.classList.add('tv-mode-active');
        }

        window.addEventListener('keydown', (e) => { if(e.code === "Space") { e.preventDefault(); toggleTimer(); } });
    </script>
</body>
</html>
